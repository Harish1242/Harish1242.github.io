name: Production Build and Deploy to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Package Dependencies
        run: npm install

      - name: Compile Static Distribution Build
        run: npm run build

      - name: Initialize Pages Routing
        uses: actions/configure-pages@v4

      - name: Compress and Stage Production Build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Execute Live Edge Deployment
        id: deployment
        uses: actions/deploy-pages@v4